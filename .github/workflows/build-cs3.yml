name: Build CloudStream CS3

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate private Twitch credentials
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          client_id = os.environ.get("TWITCH_CLIENT_ID", "").strip()
          client_secret = os.environ.get("TWITCH_CLIENT_SECRET", "").strip()
          if not client_id or not client_secret:
              raise SystemExit("Missing GitHub Actions secrets: TWITCH_CLIENT_ID and/or TWITCH_CLIENT_SECRET")
          out = Path("TwitchLiveFavoritesProvider/src/main/kotlin/recloudstream/TwitchCredentials.kt")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(
              "package recloudstream.twitchlivefavorites\n\n"
              "/** Generated by GitHub Actions. Do not commit real credentials. */\n"
              "object TwitchCredentials {\n"
              f"    const val CLIENT_ID: String = {json.dumps(client_id)}\n"
              f"    const val CLIENT_SECRET: String = {json.dumps(client_secret)}\n"
              "}\n",
              encoding="utf-8",
          )
          print("Twitch credentials generated: yes")
          PY

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: Build plugin
        run: ./gradlew TwitchLiveFavoritesProvider:make --stacktrace

      - name: Upload CS3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: TwitchLiveFavoritesProvider-cs3
          path: '**/build/*.cs3'
